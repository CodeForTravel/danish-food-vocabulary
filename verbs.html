<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danske Verber 🇩🇰</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #C8102E;
    --cream: #FFF8F0;
    --gold: #F4A426;
    --dark: #1a1a2e;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    padding: 20px;
  }

  header {
    text-align: center;
    padding: 30px 20px 22px;
    background: var(--red);
    border-radius: 20px;
    margin-bottom: 20px;
    color: white;
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    top: -30px; left: -30px;
    width: 120px; height: 120px;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
  }

  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 2.4rem;
    letter-spacing: 1px;
  }

  header p {
    font-size: 0.95rem;
    opacity: 0.85;
    margin-top: 6px;
  }

  .flag { font-size: 2rem; margin-bottom: 8px; }

  .nav-tabs {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 24px;
  }

  .nav-tab {
    padding: 8px 24px;
    border-radius: 20px;
    text-decoration: none;
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    color: var(--dark);
    background: #fff;
    box-shadow: var(--shadow);
    transition: background 0.2s, color 0.2s;
  }

  .nav-tab:hover { background: var(--gold); color: white; }
  .nav-tab.active { background: var(--red); color: white; }

  .category { margin-bottom: 30px; }

  .category-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    color: var(--red);
    border-left: 5px solid var(--gold);
    padding-left: 12px;
    margin-bottom: 14px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 12px;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    padding: 12px 14px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 10px;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 28px rgba(0,0,0,0.13);
  }

  .num {
    background: var(--red);
    color: white;
    font-family: 'Fredoka One', cursive;
    font-size: 0.85rem;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .word-block { flex: 1; min-width: 0; }

  .present {
    font-weight: 700;
    font-size: 0.92rem;
    color: var(--dark);
    line-height: 1.3;
  }

  .past {
    font-size: 0.82rem;
    color: #e09020;
    font-weight: 700;
    margin-top: 2px;
  }

  .past::before { content: '↳ '; }

  .english {
    font-size: 0.75rem;
    color: #777;
    margin-top: 3px;
  }

  .bangla {
    font-size: 0.75rem;
    color: var(--red);
    margin-top: 1px;
    font-weight: 600;
  }

  .speak-btn {
    background: var(--gold);
    border: none;
    border-radius: 50%;
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
    font-size: 0.95rem;
  }

  .speak-btn:hover { background: #e09020; }
  .speak-btn:active { transform: scale(0.9); }

  .speak-btn.playing {
    background: var(--red);
    animation: pulse 0.6s ease infinite alternate;
  }

  @keyframes pulse {
    from { transform: scale(1); }
    to { transform: scale(1.15); }
  }

  .search-wrap {
    max-width: 500px;
    margin: 0 auto 24px;
    position: relative;
  }

  .search-input {
    width: 100%;
    padding: 12px 44px 12px 40px;
    border-radius: 20px;
    border: 2px solid transparent;
    background: #fff;
    box-shadow: var(--shadow);
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    color: var(--dark);
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input:focus { border-color: var(--gold); }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1rem;
    pointer-events: none;
  }

  .search-clear {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    color: #aaa;
    display: none;
    padding: 4px;
    line-height: 1;
  }

  .search-clear.visible { display: block; }

  .no-results {
    text-align: center;
    color: #aaa;
    font-size: 0.95rem;
    padding: 40px 0;
    display: none;
  }

  .notice {
    text-align: center;
    color: #aaa;
    font-size: 0.8rem;
    margin-top: 30px;
    padding-bottom: 20px;
  }
</style>
</head>
<body>

<header>
  <div class="flag">🇩🇰</div>
  <h1>Danske Verber</h1>
  <p>Nutid → Datid &nbsp;|&nbsp; Present → Past tense</p>
</header>

<nav class="nav-tabs">
  <a href="index.html" class="nav-tab">🍎 Mad</a>
  <a href="verbs.html" class="nav-tab active">💬 Verber</a>
</nav>

<div class="search-wrap">
  <span class="search-icon">🔍</span>
  <input id="search" class="search-input" type="search" placeholder="Søg på dansk eller engelsk… / Search Danish or English…" autocomplete="off">
  <button id="search-clear" class="search-clear" aria-label="Ryd søgning">✕</button>
</div>

<div id="app"></div>
<p id="no-results" class="no-results">Ingen resultater / No results found</p>
<p class="notice">Klik 🔊 for at høre nutid og datid &nbsp;|&nbsp; Click speaker to hear both tenses</p>

<script>
const categories = [
  {
    title: "🔑 Kerneord — Core Verbs",
    items: [
      { num:1, present:"er",   past:"var",    en:"is / are → was / were", bn:"আছি / আছে → ছিলাম / ছিল" },
      { num:2, present:"har",  past:"havde",  en:"has / have → had",      bn:"আছে → ছিল" },
      { num:3, present:"kan",  past:"kunne",  en:"can → could",           bn:"পারি → পারতাম" },
      { num:4, present:"skal", past:"skulle", en:"shall / must → should", bn:"করতে হবে → করতে হত" },
      { num:5, present:"vil",  past:"ville",  en:"will / want → would",   bn:"চাই → চেয়েছিলাম" },
      { num:6, present:"må",   past:"måtte",  en:"may / must → had to",   bn:"পারি → পারতাম" },
    ]
  },
  {
    title: "💬 Hverdagsverber — Common Verbs",
    items: [
      { num:1,  present:"bliver", past:"blev",   en:"becomes → became",         bn:"হয় → হয়েছিল" },
      { num:2,  present:"siger",  past:"sagde",  en:"says → said",              bn:"বলে → বলেছিল" },
      { num:3,  present:"får",    past:"fik",    en:"gets → got",               bn:"পায় → পেয়েছিল" },
      { num:4,  present:"går",    past:"gik",    en:"goes / walks → went",      bn:"যায় → গিয়েছিল" },
      { num:5,  present:"kommer", past:"kom",    en:"comes → came",             bn:"আসে → এসেছিল" },
      { num:6,  present:"gør",    past:"gjorde", en:"does → did",               bn:"করে → করেছিল" },
      { num:7,  present:"ved",    past:"vidste", en:"knows → knew",             bn:"জানে → জানত" },
      { num:8,  present:"ser",    past:"så",     en:"sees → saw",               bn:"দেখে → দেখেছিল" },
      { num:9,  present:"tager",  past:"tog",    en:"takes → took",             bn:"নেয় → নিয়েছিল" },
      { num:10, present:"tror",   past:"troede", en:"believes → believed",      bn:"বিশ্বাস করে → বিশ্বাস করেছিল" },
      { num:11, present:"giver",  past:"gav",    en:"gives → gave",             bn:"দেয় → দিয়েছিল" },
      { num:12, present:"finder", past:"fandt",  en:"finds → found",            bn:"খোঁজে → পেয়েছিল" },
      { num:13, present:"bruger", past:"brugte", en:"uses → used",              bn:"ব্যবহার করে → ব্যবহার করেছিল" },
      { num:14, present:"synes",  past:"syntes", en:"thinks / feels → thought", bn:"মনে করে → মনে করেছিল" },
    ]
  },
  {
    title: "🏠 Dagligdags — Daily Life",
    items: [
      { num:1,  present:"bor",        past:"boede",       en:"lives → lived",          bn:"বাস করে → বাস করত" },
      { num:2,  present:"spiser",     past:"spiste",      en:"eats → ate",             bn:"খায় → খেয়েছিল" },
      { num:3,  present:"drikker",    past:"drak",        en:"drinks → drank",         bn:"পান করে → পান করেছিল" },
      { num:4,  present:"laver",      past:"lavede",      en:"makes / does → made",    bn:"বানায় → বানিয়েছিল" },
      { num:5,  present:"køber",      past:"købte",       en:"buys → bought",          bn:"কেনে → কিনেছিল" },
      { num:6,  present:"arbejder",   past:"arbejdede",   en:"works → worked",         bn:"কাজ করে → কাজ করেছিল" },
      { num:7,  present:"sover",      past:"sov",         en:"sleeps → slept",         bn:"ঘুমায় → ঘুমিয়েছিল" },
      { num:8,  present:"vasker",     past:"vaskede",     en:"washes → washed",        bn:"ধোয় → ধুয়েছিল" },
      { num:9,  present:"rydder op",  past:"ryddede op",  en:"tidies up → tidied up",  bn:"গুছায় → গুছিয়েছিল" },
      { num:10, present:"gør rent",   past:"gjorde rent", en:"cleans → cleaned",       bn:"পরিষ্কার করে → পরিষ্কার করেছিল" },
      { num:11, present:"sidder",     past:"sad",         en:"sits → sat",             bn:"বসে → বসেছিল" },
      { num:12, present:"skriver",    past:"skrev",       en:"writes → wrote",         bn:"লেখে → লিখেছিল" },
      { num:13, present:"ringer",     past:"ringede",     en:"calls → called",         bn:"ফোন করে → ফোন করেছিল" },
      { num:14, present:"møder",      past:"mødte",       en:"meets → met",            bn:"দেখা করে → দেখা করেছিল" },
      { num:15, present:"steger",     past:"stegte",      en:"fries / roasts → fried", bn:"ভাজে → ভেজেছিল" },
      { num:16, present:"bager",      past:"bagte",       en:"bakes → baked",          bn:"বেক করে → বেক করেছিল" },
      { num:17, present:"betaler",    past:"betalte",     en:"pays → paid",            bn:"পরিশোধ করে → পরিশোধ করেছিল" },
      { num:18, present:"sender",     past:"sendte",      en:"sends → sent",           bn:"পাঠায় → পাঠিয়েছিল" },
      { num:19, present:"lejer",      past:"lejede",      en:"rents → rented",         bn:"ভাড়া নেয় → নিয়েছিল" },
    ]
  }
];

function speak(present, past, btn) {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(present + ', ' + past);
    utter.lang = 'da-DK';
    utter.rate = 0.85;
    btn.classList.add('playing');
    utter.onend = () => btn.classList.remove('playing');
    utter.onerror = () => btn.classList.remove('playing');
    window.speechSynthesis.speak(utter);
  } else {
    alert('Din browser understøtter ikke tekst-til-tale.');
  }
}

const app = document.getElementById('app');

categories.forEach(cat => {
  const section = document.createElement('div');
  section.className = 'category';

  const title = document.createElement('div');
  title.className = 'category-title';
  title.textContent = cat.title;
  section.appendChild(title);

  const grid = document.createElement('div');
  grid.className = 'grid';

  cat.items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="num">${item.num}</div>
      <div class="word-block">
        <div class="present">${item.present}</div>
        <div class="past">${item.past}</div>
        <div class="english">${item.en}</div>
        <div class="bangla">${item.bn}</div>
      </div>
      <button class="speak-btn" title="Hør udtalen" aria-label="Afspil ${item.present}">🔊</button>
    `;
    const btn = card.querySelector('.speak-btn');
    btn.addEventListener('click', () => speak(item.present, item.past, btn));
    grid.appendChild(card);
  });

  section.appendChild(grid);
  app.appendChild(section);
});

const searchInput = document.getElementById('search');
const clearBtn = document.getElementById('search-clear');
const noResults = document.getElementById('no-results');

function runSearch() {
  const q = searchInput.value.trim().toLowerCase();
  clearBtn.classList.toggle('visible', q.length > 0);
  let totalVisible = 0;

  document.querySelectorAll('.category').forEach(section => {
    let anyVisible = false;
    section.querySelectorAll('.card').forEach(card => {
      const present = card.querySelector('.present').textContent.toLowerCase();
      const past = card.querySelector('.past').textContent.toLowerCase();
      const english = card.querySelector('.english').textContent.toLowerCase();
      const matches = !q || present.includes(q) || past.includes(q) || english.includes(q);
      card.style.display = matches ? '' : 'none';
      if (matches) anyVisible = true;
    });
    section.style.display = anyVisible ? '' : 'none';
    if (anyVisible) totalVisible++;
  });

  noResults.style.display = totalVisible === 0 && q ? 'block' : 'none';
}

searchInput.addEventListener('input', runSearch);
clearBtn.addEventListener('click', () => { searchInput.value = ''; runSearch(); searchInput.focus(); });
</script>
</body>
</html>
